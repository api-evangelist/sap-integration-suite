naftiko: "1.0.0-alpha1"

info:
  label: "SAP API Management API"
  description: >-
    SAP API Management API for managing API proxies, products, applications,
    developers, and key-value maps within the SAP Integration Suite API portal.
  tags:
    - SAP Integration Suite
    - API Management
    - API Proxy
    - Developer Portal
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_APIM_OAUTH_TOKEN: SAP_APIM_OAUTH_TOKEN
      SAP_APIM_HOST: SAP_APIM_HOST

capability:
  consumes:
    - type: http
      namespace: api-management
      baseUri: "https://{{env.SAP_APIM_HOST}}/apiportal/api/1.0"
      description: "SAP API Management REST API for full API lifecycle management"
      authentication:
        type: bearer
        token: "{{env.SAP_APIM_OAUTH_TOKEN}}"
      resources:
        - name: api-proxies
          path: /Management/APIProxies
          description: Manage API proxy configurations
          operations:
            - name: list-api-proxies
              method: GET
              description: List all API proxies in the tenant
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Max results
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: Skip for pagination
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-api-proxy
              method: POST
              description: Create a new API proxy
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  title: "{{tools.title}}"
                  targetEndpoint: "{{tools.targetEndpoint}}"

            - name: get-api-proxy
              method: GET
              description: Get a specific API proxy by name
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: API proxy name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-api-proxy
              method: DELETE
              description: Delete an API proxy
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: API proxy name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-products
          path: /Management/APIProducts
          description: Manage API products bundling API proxies
          operations:
            - name: list-api-products
              method: GET
              description: List all API products
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Max results
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: Skip for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-api-product
              method: GET
              description: Get a specific API product by name
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: API product name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications
          path: /Management/Applications
          description: Manage developer applications
          operations:
            - name: list-applications
              method: GET
              description: List all developer applications
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Max results
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-application
              method: GET
              description: Get a specific application by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Application identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: developers
          path: /Management/Developers
          description: Manage developer accounts
          operations:
            - name: list-developers
              method: GET
              description: List all registered developers
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Max results
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: api-management-rest
      resources:
        - path: /v1/api-proxies
          name: api-proxies
          description: API proxy management
          operations:
            - method: GET
              name: list-api-proxies
              description: List all API proxies
              call: "api-management.list-api-proxies"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/api-products
          name: api-products
          description: API product management
          operations:
            - method: GET
              name: list-api-products
              description: List all API products
              call: "api-management.list-api-products"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications
          name: applications
          description: Developer application management
          operations:
            - method: GET
              name: list-applications
              description: List all developer applications
              call: "api-management.list-applications"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: api-management-mcp
      transport: http
      tools:
        - name: list-api-proxies
          description: List all API proxies in the SAP API Management tenant
          hints:
            readOnly: true
            openWorld: true
          call: "api-management.list-api-proxies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-api-proxy
          description: Get a specific API proxy configuration by name
          hints:
            readOnly: true
            openWorld: false
          call: "api-management.get-api-proxy"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-api-proxy
          description: Create a new API proxy in SAP API Management
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "api-management.create-api-proxy"
          with:
            name: "tools.name"
            title: "tools.title"
            targetEndpoint: "tools.targetEndpoint"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-api-proxy
          description: Delete an API proxy from SAP API Management
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "api-management.delete-api-proxy"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-api-products
          description: List all API products in the SAP API Management portal
          hints:
            readOnly: true
            openWorld: true
          call: "api-management.list-api-products"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-api-product
          description: Get a specific API product by name
          hints:
            readOnly: true
            openWorld: false
          call: "api-management.get-api-product"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-applications
          description: List all developer applications registered in the portal
          hints:
            readOnly: true
            openWorld: true
          call: "api-management.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-developers
          description: List all registered developers in the API portal
          hints:
            readOnly: true
            openWorld: true
          call: "api-management.list-developers"
          outputParameters:
            - type: object
              mapping: "$."
